CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=600000

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

CONFIG_SSD1306=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=10

CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

CONFIG_ZMK_DISPLAY_INVERT=n

CONFIG_ZMK_POINTING=y

CONFIG_ZMK_EXT_POWER=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=3
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=0
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
CONFIG_BT_GAP_PERIPHERAL_PREF_PARAMS=y
# 7.5ms интервал (min=max)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
# 0 = не пропускать connection events (минимальная задержка)
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# timeout в 10ms units: 400 => 4s (нормально для стабильности)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400


CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=y
