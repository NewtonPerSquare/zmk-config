# Отключаем deep sleep (самая частая причина "после простоя правая пропадает")
CONFIG_ZMK_SLEEP=n

# Увеличим idle таймаут, чтобы не было "уснул через секунду"
CONFIG_ZMK_IDLE_TIMEOUT=60000

# (опционально) делаем split BLE более "отзывчивым"
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=400
